name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Repo coverage floor. setupQueue has one device-error branch that
  # cannot be exercised against the in-memory fake, leaving 99.4%.
  COVERAGE_MIN: "99.4"

jobs:
  # Native runners: real CPUs, run the full test suite directly.
  native:
    name: native ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: go test (coverage)
        run: |
          CGO_ENABLED=0 go test -covermode=atomic -coverprofile=cover.out ./...
      - name: enforce coverage floor
        run: |
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "total coverage: ${pct}% (floor ${COVERAGE_MIN}%)"
          awk -v p="$pct" -v m="$COVERAGE_MIN" 'BEGIN { exit (p+0 >= m+0) ? 0 : 1 }' \
            || { echo "coverage ${pct}% below floor ${COVERAGE_MIN}%"; exit 1; }

  # Emulated runners: cross-compile per-package test binaries, then run
  # each under qemu-user via a per-arch docker image. virtio is LE, but
  # virtio-net carries network-byte-order (big-endian) packet fields;
  # s390x (big-endian host) is the load-bearing check that endianness is
  # explicit everywhere.
  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            platform: linux/riscv64
            image: debian:trixie
            qemu_cpu: rv64,v=true,vlen=128
          - arch: loong64
            platform: linux/loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: la464
          - arch: ppc64le
            platform: linux/ppc64le
            image: debian:trixie
            qemu_cpu: power9
          - arch: s390x
            platform: linux/s390x
            image: debian:trixie
            qemu_cpu: qemu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: register binfmt handlers
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: cross-compile per-package test binaries
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p tbin
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/.' '__')
            # Skip packages with no test files (go test -c emits nothing).
            if CGO_ENABLED=0 GOOS=linux go test -covermode=atomic \
                 -c -o "tbin/${name}.test" "$pkg"; then
              if [ -f "tbin/${name}.test" ]; then
                echo "$pkg -> tbin/${name}.test"
              fi
            fi
          done

      - name: run test binaries under qemu (${{ matrix.arch }})
        run: |
          set -euo pipefail
          shopt -s nullglob
          for bin in tbin/*.test; do
            echo "::group::run $bin"
            docker run --rm --platform ${{ matrix.platform }} \
              -e QEMU_CPU='${{ matrix.qemu_cpu }}' \
              -v "$PWD:/w" -w /w "${{ matrix.image }}" \
              "/w/$bin" -test.v
            echo "::endgroup::"
          done
